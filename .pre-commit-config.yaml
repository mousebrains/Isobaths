# Pre-commit hooks for Isobaths.  Install once with:  pre-commit install
# Run against everything with:  pre-commit run --all-files
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.nc$'
      - id: end-of-file-fixer
        exclude: '\.nc$'
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-added-large-files
        args: ["--maxkb=500"]   # blocks stray multi-MB DEMs; fixtures are ~240 kB

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff            # lint (with autofix)
        args: ["--fix"]
      - id: ruff-format     # format
