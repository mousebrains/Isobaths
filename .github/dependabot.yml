version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    # Actions are pinned to a major tag (@v7), so Dependabot only proposes
    # major bumps (v7 -> v8); group them into a single PR when they land.
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    # Disable routine version-update PRs. The requirements*.txt floors are
    # deliberate minimums (>= the current minor series). Dependabot cannot be
    # told to leave a ">=" floor alone -- it re-tightens the lower bound to the
    # latest patch, and "ignore: update-types" does not apply to lower-bound
    # bumps of range requirements -- so we turn routine version updates off and
    # bump dependencies by hand. Security-update PRs are NOT affected by this
    # limit (enable Dependabot security updates in repo settings for those).
    open-pull-requests-limit: 0
