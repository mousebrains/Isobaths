version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    # Roll all action bumps into a single weekly PR.
    groups:
      github-actions:
        patterns: ["*"]
    # Only surface major bumps (e.g. v7 -> v8); patch/minor churn is noise.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    # Roll all Python dependency bumps into a single weekly PR instead of
    # one-per-package (keeps this personal repo current without the noise).
    groups:
      python-deps:
        patterns: ["*"]
    # Only surface major bumps (e.g. 3.x -> 4.x); patch/minor churn is noise.
    # Floors in requirements.txt track the minor series, so this leaves them
    # quiet until a genuinely new major release lands.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
